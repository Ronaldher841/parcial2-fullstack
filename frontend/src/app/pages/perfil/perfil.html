<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="text-center mb-4">Perfil</h2>

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" [(ngModel)]="nombre" name="nombre">
          </div>

          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" [(ngModel)]="apellido" name="apellido">
          </div>

          <div class="mb-3">
            <label class="form-label">Edad</label>
            <input type="number" class="form-control" [(ngModel)]="edad" name="edad">
          </div>

          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" [(ngModel)]="correo" name="correo">
          </div>

          <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" [(ngModel)]="telefono" name="telefono">
          </div>

          <div *ngIf="mensaje" class="alert alert-info">
            {{ mensaje }}
          </div>

          <button class="btn btn-success w-100" (click)="guardarPerfil()">
            {{ existePerfil ? 'Actualizar perfil' : 'Crear perfil' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
